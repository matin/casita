[project]
site_name = "Casita"
site_description = "How Casita searches, enriches, ranks, and renders rental listings."
site_author = "Casita contributors"
site_url = "https://matin.github.io/casita/"
repo_url = "https://github.com/matin/casita"
repo_name = "matin/casita"
edit_uri = "edit/main/docs"
copyright = "Copyright &copy; 2026 Casita contributors"
nav = [
  { "Backstory" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "How It Works" = [
    { "Routing" = "how-it-works/routing.md" },
    { "Photo Evaluation" = "how-it-works/photo-eval.md" },
    { "Deduplication" = "how-it-works/deduplication.md" },
    { "Ranking" = "how-it-works/ranking.md" },
    { "Learning" = "how-it-works/learning.md" },
    { "Static Site" = "how-it-works/static-site.md" },
  ] },
  { "Architecture" = "architecture.md" },
  { "Data Model" = "data-model.md" },
  { "Scraping" = "scraping.md" },
]

[project.theme]
language = "en"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "lucide/moon"
name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "lucide/sun"
name = "Switch to light mode"
